name: postal verify

# The HARD gate as a required-check. Every push / PR runs the deterministic
# verifier over the checked-out .postal/ tree. If any event fails (bad signature,
# non-deterministic path, append-only violation, unknown author…), the job fails
# and — with branch protection requiring this check — the change cannot merge.
#
# This is the CCDD model on the WRITE side: lo verificable lo frena una máquina.

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run postal gate
        # The gate as a required-check. Runs against this repo's own .postal/ tree (the cli is
        # at src/cli.js here; a DATA repo that vendors the cli would point at its own path).
        run: node src/cli.js verify
